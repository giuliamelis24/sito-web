<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
    <title>Server FastAPI</title>
</head>
<body>
    <h1>Gestione Orario</h1>
    
    <div class="container">
        <p id="orario">Clicca il tasto per conoscere l'ora del server</p>
        <button id="btn-ora">Aggiorna Ora</button>
    </div>

    <script src="/static/script.js"></script>

    <hr>

    <div class="card">
        <h3>Saluto Personalizzato</h3>
        <input type="text" id="input-nome" placeholder="Scrivi il tuo nome...">
        <button id="btn-saluto">Invia al Server</button>
        <h2 id="risposta-saluto"></h2>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>

<div class="card">
        <h3>Calcolatrice Somma</h3>
        <input type="number" id="num1" placeholder="Primo numero">
        +
        <input type="number" id="num2" placeholder="Secondo numero">
        <button id="btn-somma">Calcola</button>
        <h2 id="risultato-somma"></h2>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
